name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --bundles dmg,app
            artifact: macos
          - platform: windows-latest
            args: --bundles nsis,msi
            artifact: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Ensure frontend dist exists
        run: |
          mkdir -p ui/dist
          printf '%s\n' '<!doctype html><html><body></body></html>' > ui/dist/index.html

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build bundles
        working-directory: src-tauri
        run: cargo tauri build ${{ matrix.args }}

      - name: Upload macOS artifacts
        if: matrix.artifact == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: UsageCheck-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.artifact == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: UsageCheck-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/UsageCheck-macos/*.dmg
            dist/UsageCheck-windows/*.exe
            dist/UsageCheck-windows/*.msi
          generate_release_notes: true
