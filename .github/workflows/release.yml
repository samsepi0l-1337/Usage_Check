name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin macOS 15 so the runner image does not silently jump to macOS 26
          # when the macos-latest label migrates.
          - platform: macos-15
            edition: free
            cargo_features: custom-protocol,edition-free
            tauri_config: ""
            product_name: UsageCheck-Free
            args: --bundles dmg,app
            artifact: macos-free
          - platform: macos-15
            edition: pro
            cargo_features: custom-protocol,edition-pro
            tauri_config: --config tauri.pro.conf.json
            product_name: UsageCheck-Pro
            args: --bundles dmg,app
            artifact: macos-pro
          - platform: windows-latest
            edition: free
            cargo_features: custom-protocol,edition-free
            tauri_config: ""
            product_name: UsageCheck-Free
            args: --bundles nsis,msi
            artifact: windows-free
          - platform: windows-latest
            edition: pro
            cargo_features: custom-protocol,edition-pro
            tauri_config: --config tauri.pro.conf.json
            product_name: UsageCheck-Pro
            args: --bundles nsis,msi
            artifact: windows-pro

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: edition-${{ matrix.edition }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Ensure frontend dist exists
        run: |
          mkdir -p ui/dist
          printf '%s\n' '<!doctype html><html><body></body></html>' > ui/dist/index.html

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build bundles (${{ matrix.edition }})
        working-directory: src-tauri
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.edition }}" = "pro" ]; then
            cargo tauri build \
              --features "${{ matrix.cargo_features }}" \
              ${{ matrix.tauri_config }} \
              ${{ matrix.args }} \
              -- --no-default-features
          else
            cargo tauri build \
              --features "${{ matrix.cargo_features }}" \
              ${{ matrix.tauri_config }} \
              ${{ matrix.args }}
          fi

      - name: Collect bundle paths
        id: bundles
        shell: bash
        run: |
          set -euo pipefail
          # Cargo workspace puts release output at repo-root target/, not src-tauri/target/.
          ROOT_BUNDLE="target/release/bundle"
          NESTED_BUNDLE="src-tauri/target/release/bundle"
          if [ -d "$ROOT_BUNDLE" ]; then
            echo "dir=$ROOT_BUNDLE" >> "$GITHUB_OUTPUT"
          elif [ -d "$NESTED_BUNDLE" ]; then
            echo "dir=$NESTED_BUNDLE" >> "$GITHUB_OUTPUT"
          else
            echo "No bundle directory found" >&2
            find . -path '*/release/bundle/*' -print 2>/dev/null | head -50 >&2 || true
            exit 1
          fi
          ls -lah "$(grep '^dir=' "$GITHUB_OUTPUT" | cut -d= -f2)" || true

      # Without an Apple Developer ID, Tauri must still ad-hoc sign the .app bundle
      # (signingIdentity "-"). Linker-only signatures look "damaged" under Gatekeeper.
      - name: Verify macOS ad-hoc code signature
        if: startsWith(matrix.artifact, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="${{ steps.bundles.outputs.dir }}"
          APP="$BUNDLE_DIR/macos/${{ matrix.product_name }}.app"
          test -d "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -dv --verbose=4 "$APP" 2>&1 | tee /tmp/usagecheck-codesign.txt
          grep -q 'Signature=adhoc' /tmp/usagecheck-codesign.txt
          grep -q 'Sealed Resources version=2' /tmp/usagecheck-codesign.txt
          # Reject linker-only signatures that Gatekeeper treats as damaged.
          if grep -q 'linker-signed' /tmp/usagecheck-codesign.txt; then
            echo "ERROR: app is still linker-signed only; bundle was not sealed" >&2
            exit 1
          fi

      - name: Upload macOS artifacts
        if: startsWith(matrix.artifact, 'macos')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.product_name }}-macos
          path: |
            ${{ steps.bundles.outputs.dir }}/dmg/*.dmg
            ${{ steps.bundles.outputs.dir }}/macos/*.app
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: startsWith(matrix.artifact, 'windows')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.product_name }}-windows
          path: |
            ${{ steps.bundles.outputs.dir }}/nsis/*.exe
            ${{ steps.bundles.outputs.dir }}/msi/*.msi
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Artifacts keep bundle subdirs (dmg/, nsis/, msi/) from upload paths.
          files: |
            dist/UsageCheck-Free-macos/**/*.dmg
            dist/UsageCheck-Pro-macos/**/*.dmg
            dist/UsageCheck-Free-windows/**/*.exe
            dist/UsageCheck-Pro-windows/**/*.exe
            dist/UsageCheck-Free-windows/**/*.msi
            dist/UsageCheck-Pro-windows/**/*.msi
          fail_on_unmatched_files: true
          generate_release_notes: true
