openapi: 3.1.0
info:
  title: UsageCheck Local API
  version: "1.0.0"
  description: |
    Read-only local HTTP API exposing the same Codex, Claude Code, and
    Antigravity (agy) usage that the UsageCheck tray menu displays.

    Designed so other coding agents (Codex, Claude Code, agy, Cursor, ...) can
    build MCP servers or skills on top of a stable JSON contract instead of
    scraping the tray UI.

    ## Semantics
    - All quota figures are **used percent** (`0` = unused, `100` = exhausted),
      matching the tray. Agy `remainingFraction` is already converted to used %.
    - Data is served from the latest background poll snapshot (refreshed every
      ~60s). The `updated_at` field reports when that snapshot was produced;
      it is `null` until the first poll completes.

    ## Security
    - The server binds to `127.0.0.1` only and is never exposed off-host.
    - No credentials, access tokens, or refresh tokens are ever returned.
    - The API is read-only (GET only).
    - Optional bearer-token auth: set `USAGECHECK_API_TOKEN=<token>` to require
      `Authorization: Bearer <token>` on every endpoint except the
      liveness/discovery paths (`/health`, `/`) — i.e. `/v1/*`, `/metrics`, and
      `/openapi.yaml`. When unset, the API is open (localhost-only bind is the
      default guard).

    ## Enabling / configuring
    - Enabled by default when the tray app runs.
    - `USAGECHECK_API_DISABLE=1` disables the server.
    - `USAGECHECK_API_PORT=<port>` overrides the default port (`5178`).
    - `USAGECHECK_API_TOKEN=<token>` enables bearer-token auth (see Security).
servers:
  - url: http://127.0.0.1:5178
    description: Default local bind (override with USAGECHECK_API_PORT)
# Auth is optional: bearerAuth is enforced only when USAGECHECK_API_TOKEN is
# set. The empty `{}` requirement expresses "or no auth" (the default).
security:
  - bearerAuth: []
  - {}
tags:
  - name: meta
    description: Service metadata and discovery
  - name: usage
    description: Usage snapshots
paths:
  /:
    get:
      tags: [meta]
      summary: API index
      description: Lists the available endpoints and the service version.
      operationId: getIndex
      responses:
        "200":
          description: Service index
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Index"
  /health:
    get:
      tags: [meta]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
              example:
                status: ok
                version: "0.1.1"
                updated_at: "2026-07-10T03:41:00Z"
                stale_seconds: 12
                account_count: 3
                status_counts: { ok: 2, stale: 1 }
  /v1/usage:
    get:
      tags: [usage]
      summary: All accounts' usage
      description: Returns the latest usage snapshot for every configured account.
      operationId: getUsage
      responses:
        "200":
          description: Usage snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
  /v1/usage/{provider}:
    get:
      tags: [usage]
      summary: One provider's usage
      description: Returns the usage snapshot filtered to a single provider.
      operationId: getUsageByProvider
      parameters:
        - name: provider
          in: path
          required: true
          description: Provider identifier.
          schema:
            $ref: "#/components/schemas/Provider"
      responses:
        "200":
          description: Usage snapshot for the requested provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
        "404":
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: unknown_provider
                message: "unknown provider 'foo' (expected codex, claude, or agy)"
  /v1/accounts:
    get:
      tags: [usage]
      summary: Account inventory
      description: >
        A lightweight list of configured accounts with a non-secret auth-method
        label (`auth_kind`), without the full usage payload.
      operationId: getAccounts
      responses:
        "200":
          description: Configured accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsResponse"
  /v1/alerts:
    get:
      tags: [usage]
      summary: Near-limit alerts
      description: >
        Every account/window (and agy pool/window) whose used-percent is at or
        above the alert threshold (percent; default 90, override with the
        USAGECHECK_ALERT_THRESHOLD env var, clamped 0–100).
      operationId: getAlerts
      responses:
        "200":
          description: Windows at or above the threshold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsResponse"
  /v1/usage.csv:
    get:
      tags: [usage]
      summary: Usage as CSV
      description: >
        The current usage snapshot as CSV (text/csv). Header:
        `provider,account,plan,status,window,pool,used_percent`, then one row
        per account/window (and per agy pool/window). Fields with commas,
        quotes, or newlines are RFC-4180 quoted.
      operationId: getUsageCsv
      responses:
        "200":
          description: CSV export
          content:
            text/csv:
              schema:
                type: string
  /metrics:
    get:
      tags: [meta]
      summary: Prometheus metrics
      description: >
        Usage snapshot in Prometheus text-exposition format
        (text/plain; version=0.0.4): a `usagecheck_account_count` gauge plus one
        `usagecheck_used_percent` gauge per account/window (and per agy pool),
        labeled by provider/account. Suitable as a scrape target.
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus text-format metrics
          content:
            text/plain:
              schema:
                type: string
  /openapi.yaml:
    get:
      tags: [meta]
      summary: This OpenAPI document
      operationId: getOpenapi
      responses:
        "200":
          description: The OpenAPI 3.1 specification for this API
          content:
            application/yaml:
              schema:
                type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Optional. Required on data endpoints only when USAGECHECK_API_TOKEN is
        set; the liveness/discovery paths (/health, /) never require it.
  schemas:
    Provider:
      type: string
      enum: [codex, claude, agy, cursor, grok, higgsfield]
      description: Usage provider category.
    Status:
      type: string
      enum: [ok, needs_login, rate_limited, error, stale, waiting_for_usage, identity_changed, experimental_error, needs_setup]
      description: |
        Freshness/auth status for an account's most recent poll.
        - `ok`: live data fetched successfully.
        - `needs_login`: token missing/expired (401/403); may fall back to local logs.
        - `rate_limited`: provider returned 429.
        - `error`: network/other failure.
        - `stale`: transient failure; serving the last successful in-memory result.
        - `waiting_for_usage`: authenticated but no usage windows reported yet.
        - `identity_changed`: the CLI profile now belongs to a different identity than expected.
        - `experimental_error`: an experimental (reference/DB) provider probe failed.
        - `needs_setup`: provider connected but not yet configured (e.g. Higgsfield credits absent).
    Quota:
      type: object
      description: A single usage window (used percent).
      required: [used_percent]
      properties:
        used_percent:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Percent of the window consumed (0-100).
          example: 38.0
        window_label:
          type: string
          description: Human label derived from window_seconds (e.g. "5h", "7d").
          example: "5h"
        window_seconds:
          type: [integer, "null"]
          format: int64
          description: Length of the quota window in seconds, when known.
          example: 18000
        resets_at:
          type: [string, "null"]
          format: date-time
          description: RFC3339 timestamp when the window resets, when known.
          example: "2026-07-10T08:41:00Z"
    Pool:
      type: object
      description: |
        An Antigravity (agy) Model Quota pool. Agy exposes two shared pools:
        "Gemini Models" and "Claude and GPT models".
      required: [name]
      properties:
        name:
          type: string
          example: "Gemini Models"
        five_hour:
          oneOf:
            - $ref: "#/components/schemas/Quota"
            - type: "null"
        week:
          oneOf:
            - $ref: "#/components/schemas/Quota"
            - type: "null"
    TokenTotals:
      type: object
      description: |
        Local-log token totals (Codex/Claude fallback only, when the live quota
        API is unavailable). Zero for accounts served from the live quota API.
      required: [five_hours, week, month]
      properties:
        five_hours:
          type: integer
          format: int64
          example: 0
        week:
          type: integer
          format: int64
          example: 0
        month:
          type: integer
          format: int64
          example: 0
    AuthKind:
      type: string
      enum: [cli_profile, browser_oauth, cursor_database, xai_key, higgsfield_cli]
      description: Non-secret label for how an account authenticates.
    Account:
      type: object
      required: [id, provider, display_name, status, auth_kind]
      properties:
        id:
          type: string
        provider:
          $ref: "#/components/schemas/Provider"
        display_name:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        auth_kind:
          $ref: "#/components/schemas/AuthKind"
    AccountsResponse:
      type: object
      required: [count, accounts]
      properties:
        count:
          type: integer
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/Account"
    Alert:
      type: object
      required: [provider, account, window, used_percent]
      properties:
        provider:
          $ref: "#/components/schemas/Provider"
        account:
          type: string
        window:
          type: string
          enum: ["5h", "7d"]
        pool:
          type: [string, "null"]
          description: agy pool name, when the alert is for a pool window.
        used_percent:
          type: number
    AlertsResponse:
      type: object
      required: [threshold, count, alerts]
      properties:
        threshold:
          type: number
          example: 90
        count:
          type: integer
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
    AccountUsage:
      type: object
      required: [id, provider, auth_kind, display_name, status, pools, token_totals]
      properties:
        id:
          type: string
          description: Stable account identifier (UUID).
          example: "6f1c2b8e-0a1d-4c33-9f6e-2b7c9d0e1a22"
        provider:
          $ref: "#/components/schemas/Provider"
        auth_kind:
          $ref: "#/components/schemas/AuthKind"
        display_name:
          type: string
          description: Email or plan-aware account name.
          example: "user@example.com"
        plan:
          type: [string, "null"]
          description: Provider plan name, when known.
          example: "pro"
        status:
          $ref: "#/components/schemas/Status"
        five_hour:
          oneOf:
            - $ref: "#/components/schemas/Quota"
            - type: "null"
          description: Account-level 5-hour window (most constrained pool for agy).
        week:
          oneOf:
            - $ref: "#/components/schemas/Quota"
            - type: "null"
          description: Account-level 7-day window (most constrained pool for agy).
        pools:
          type: array
          description: Per-pool breakdown (agy only; empty for Codex/Claude).
          items:
            $ref: "#/components/schemas/Pool"
        token_totals:
          $ref: "#/components/schemas/TokenTotals"
        local_status:
          type: [string, "null"]
          description: >-
            Provenance of the locally-aggregated token usage when it is not a
            clean `ok` (e.g. `unavailable`, `partial`, `truncated`, `ambiguous`,
            `conflict`, `assumed`, `no_local_profile`). Absent/null means the
            local totals are fully trustworthy. Lets clients distinguish a real
            zero from a failed/ambiguous local scan.
          example: "assumed"
        detail_suffix:
          type: [string, "null"]
          description: Provider-specific trailing detail, e.g. remaining API credits.
    UsageResponse:
      type: object
      required: [updated_at, count, accounts]
      properties:
        updated_at:
          type: [string, "null"]
          format: date-time
          description: When the served snapshot was produced (null before first poll).
          example: "2026-07-10T03:41:00Z"
        count:
          type: integer
          description: Number of accounts in `accounts`.
          example: 3
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/AccountUsage"
    Index:
      type: object
      required: [service, version, endpoints]
      properties:
        service:
          type: string
          example: usagecheck-local-api
        version:
          type: string
          example: "0.1.1"
        endpoints:
          type: array
          items:
            type: string
          example:
            - "GET /health"
            - "GET /v1/usage"
            - "GET /v1/usage/{provider}"
            - "GET /openapi.yaml"
    Health:
      type: object
      required: [status, version, updated_at, account_count]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: "0.1.1"
        updated_at:
          type: [string, "null"]
          format: date-time
        stale_seconds:
          type: [integer, "null"]
          description: Age of the served snapshot in seconds; null before the first poll.
          example: 12
        account_count:
          type: integer
          example: 3
        status_counts:
          type: object
          additionalProperties:
            type: integer
          description: Count of accounts by status string.
          example: { ok: 2, stale: 1 }
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: unknown_provider
        message:
          type: string
          example: "unknown provider 'foo' (expected codex, claude, or agy)"
